# ═══════════════════════════════════════════════════════════════
#   TrendRadar — Mẹ và Bé | China Market Research
#   Purpose: Monitor Chinese mother & baby trends for Vietnam
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Ho_Chi_Minh"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"

platforms:
  enabled: true
  sources:
    - id: "douyin"
      name: "抖音 (Douyin)"
    - id: "weibo"
      name: "微博 (Weibo)"
    - id: "zhihu"
      name: "知乎 (Zhihu)"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "tieba"
      name: "贴吧"

rss:
  enabled: false
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds: []

report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 10
  max_news_per_keyword: 5

filter:
  method: "keyword"
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.65
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - hotlist
    - new_items
    - ai_analysis
    - rss
  regions:
    hotlist: true
    new_items: true
    rss: false
    standalone: true
    ai_analysis: true
  standalone:
    platforms: ["zhihu", "douyin"]
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  channels:
    telegram:
      bot_token: ""
      chat_id: ""
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 90
  remote:
    retention_days: 90
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "anthropic/claude-haiku-4-5-20251001"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 2
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Vietnamese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "daily"
  max_news_for_analysis: 100
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "Tiếng Việt"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: true
    rss: true
    standalone: true

advanced:
  debug: false
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
